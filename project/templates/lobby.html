<!DOCTYPE html>
<html lang='pt-BR'>
    <head>
        <meta charset='UTF-8'>
        <title>RPG</title>

        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        <link href='https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'>
        <link rel='stylesheet' href='{{ url_for("static", filename="styles/main.css") }}'>
        <link rel='stylesheet' href='{{ url_for("static", filename="styles/home.css") }}'>
    </head>

    <body>
        <div class='tittle'>
            <h1>RPG</h1>
        <div class='cards'>
            {% for campanha in campanhas %}
                <a class='card' href='{{ url_for("lobby", campanha_id=campanha.id) }}'>
                    <div class='btns-card'>
                        <button class="btn-excluir" onclick="event.preventDefault(); event.stopPropagation(); abrirModalExcluir('{{ campanha.id }}')">
                            <span class="material-symbols-outlined">delete</span>
                        </button>
                    </div>
                    <h2>{{ campanha.nome }}</h2>
                    <p>{{ campanha.descricao }}</p>
                    <span>Mestre: {{ campanha.mestre }}</span>
                </a>
            {% endfor %}
        </div>
</html>
