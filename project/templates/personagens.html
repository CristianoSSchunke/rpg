<!DOCTYPE html>
<html lang='pt-BR'>
    <head>
        <meta charset='UTF-8'>
        <title>RPG</title>

        <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
        <link href='https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;500&display=swap' rel='stylesheet'>

        <link rel='stylesheet' href='{{ url_for("static", filename="styles/main.css") }}'>
        <link rel='stylesheet' href='{{ url_for("static", filename="styles/personagens.css") }}'>
    </head>

    <body>
        <nav>
            <a href="{{ url_for('lobby') }}" class='btn-voltar'>
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
        </nav>

        <div class='conteiner-pag'>
            <div class='tittle'>
                <h1>Jogadores</h1>
            </div>

            <div class='btn-criar-personagem'>
                <button onclick='abrirModal("modal-personagem")' title='Criar novo personagem'>
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>

            <div id='modal-personagem' class='modal'>
                <div class='conteudo-modal'>
                    <h2>Novo Personagem</h2>

                    <div class="input-group">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" placeholder="Nome do personagem">
                    </div>

                    <div class="radio-group">
                        <input type="radio" id="sexo_m" name="sexo" value="M" checked hidden>
                        <label for="sexo_m" class="radio-option">
                            <span class="material-symbols-outlined">man</span>
                            Masculino
                        </label>
                        <input type="radio" id="sexo_f" name="sexo" value="F" hidden>
                        <label for="sexo_f" class="radio-option">
                            <span class="material-symbols-outlined">woman</span>
                            Feminino
                        </label>
                    </div>

                    <div class='duplas-modal'>
                        <div class='input-group'>
                            <label for='altura'>Altura (m)</label>
                            <input type='number' id='altura' placeholder='Altura em metros' min='0' step='1'>
                        </div>

                        <div class='input-group'>
                            <label for='peso'>Peso (kg)</label>
                            <input type='number' id='peso' placeholder='Peso em quilos' min='0' step='1'>
                        </div>
                    </div>

                    <div class='duplas-modal'>
                        <div class='input-group'>
                            <label for='idade'>Idade</label>
                            <input type='number' id='idade' placeholder='Idade atual' min='0' step='1'>
                        </div>

                        <div class='input-group'>
                            <label for='nivel'>Nível</label>
                            <input type='number' id='nivel' placeholder='Nível do personagem' min='0' step='1' value='1'>
                        </div>
                    </div>

                    <div class='input-group'>
                        <label for='descricao'>Descrição</label>
                        <input type='text' id='descricao' placeholder='Descrição do personagem'>
                    </div>

                    <div class='btn-conteudo-modal'>
                        <button onclick='salvarCampanha()'>Criar</button>
                        <button onclick='fecharModal("modal-personagem")'>Cancelar</button>
                    </div>

                </div>
            </div>

            <div class='cards'>
                {% for personagem in personagens %}
                    <a class='card'>
                        <h2>{{ personagem.nome }}</h2>
                    </a>
                {% endfor %}
            </div>
        </div>
        <script src="{{ url_for('static', filename='scripts/main.js') }}"></script>
        <script src="{{ url_for('static', filename='scripts/personagens.js') }}"></script>
    </body>
</html>
